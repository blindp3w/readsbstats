{% extends "base.html" %}
{% block title %}Live — readsbstats{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Live <span id="live-count" class="live-count-heading"></span></h1>
  <span id="live-updated" class="result-info"></span>
</div>

<div id="live-map" class="live-map"></div>

<div class="table-wrap">
  <table id="live-table" aria-label="Currently tracked aircraft">
    <thead>
      <tr>
        <th>ICAO</th>
        <th>Callsign</th>
        <th>Route</th>
        <th>Registration</th>
        <th>Type</th>
        <th>Source</th>
        <th>Last seen</th>
      </tr>
    </thead>
    <tbody id="live-body">
      <tr><td colspan="7" class="loading">Loading…</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ root_path }}/static/js/live.js"></script>
{% endblock %}
