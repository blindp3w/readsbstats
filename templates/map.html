{% extends "base.html" %}
{% block title %}Live — readsbstats{% endblock %}
{% block body_class %}map-page{% endblock %}

{% block content %}
<div id="map-full"></div>

<!-- Aircraft list sidebar (closed by default) -->
<div id="map-sidebar" class="map-sidebar" aria-label="Aircraft list">
  <button id="map-sidebar-toggle" class="map-sidebar-toggle" aria-label="Toggle aircraft list" title="Show aircraft list">◀</button>
  <div class="map-sidebar-inner">
    <div class="map-sidebar-header">
      <span id="map-sidebar-count" class="map-ac-count"></span>
    </div>
    <div class="map-sidebar-scroll">
      <table aria-label="Currently visible aircraft">
        <thead>
          <tr>
            <th>ICAO</th>
            <th>Callsign</th>
            <th>Route</th>
            <th>Reg</th>
            <th>Type</th>
            <th>Alt</th>
            <th>Speed</th>
            <th>Src</th>
            <th>Seen</th>
          </tr>
        </thead>
        <tbody id="map-sidebar-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="map-controls-overlay" role="complementary" aria-label="Map playback controls">

  <!-- Row 1: mode + time display + aircraft count -->
  <div class="map-ctrl-row">
    <button id="map-mode-live" class="map-mode-btn active" title="Live mode — auto-refreshes every 10 s">Live ●</button>
    <button id="map-mode-rewind" class="map-mode-btn" title="Rewind mode — scrub to any point in history">⏮ Rewind</button>
    <span id="map-time-disp" class="map-time-disp"></span>
    <span id="map-ac-count" class="map-ac-count"></span>
  </div>

  <!-- Row 2: time slider -->
  <div class="map-ctrl-row">
    <input type="range" id="map-slider" aria-label="Time position" disabled>
  </div>

  <!-- Row 3: playback controls -->
  <div class="map-ctrl-row">
    <button class="map-ctrl-btn" data-skip="-3600" title="Back 1 hour">⏮ 1h</button>
    <button class="map-ctrl-btn" data-skip="-600" title="Back 10 minutes">⏮ 10m</button>
    <button id="map-play-btn" class="map-ctrl-btn" title="Play / Pause">▶</button>
    <button class="map-ctrl-btn" data-skip="600" title="Forward 10 minutes">10m ⏭</button>
    <button class="map-ctrl-btn" data-skip="3600" title="Forward 1 hour">1h ⏭</button>
    <span class="map-speed-label">Speed:</span>
    <button class="map-speed-btn active" data-speed="1">1×</button>
    <button class="map-speed-btn" data-speed="2">2×</button>
    <button class="map-speed-btn" data-speed="5">5×</button>
    <button class="map-speed-btn" data-speed="10">10×</button>
    <button id="map-jump-now" class="map-ctrl-btn" title="Return to live" style="margin-left:.3rem">→ Now</button>
  </div>

  <!-- Row 4: heatmap + coverage overlays (shared window selector) -->
  <div class="map-heat-row">
    <button id="map-heat-btn" class="map-mode-btn" title="Toggle position density heatmap">Heatmap</button>
    <button id="map-coverage-btn" class="map-mode-btn" title="Toggle coverage range outline">Coverage</button>
    <span id="map-overlay-windows" class="hidden">
      <button class="map-overlay-win active" data-win="24h">24h</button>
      <button class="map-overlay-win" data-win="7d">7d</button>
      <button class="map-overlay-win" data-win="30d">30d</button>
      <button class="map-overlay-win" data-win="all">All</button>
    </span>
    <span id="map-overlay-status" class="hidden map-heat-status-text">Loading…</span>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
  const MAP_HISTORY_HOURS = {{ history_hours | tojson }};
  const RECEIVER_LAT      = {{ receiver_lat  | tojson }};
  const RECEIVER_LON      = {{ receiver_lon  | tojson }};
</script>
<script src="{{ root_path }}/static/vendor/leaflet.heat.min.js"></script>
<script src="{{ root_path }}/static/js/map.js"></script>
{% endblock %}
