<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>readsbstats</title>
    <script>
      // Theme bootstrap — runs before paint to avoid flash-of-wrong-theme.
      // Mirrors current Jinja UI (dark-only); honours rsbs_theme override.
      (function () {
        try {
          var saved = localStorage.getItem('rsbs_theme');
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = saved ? saved === 'dark' : prefersDark || true;
          document.documentElement.classList.toggle('dark', dark);
        } catch (_e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
