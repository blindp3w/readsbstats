# readsbstats nginx location block
# Add this inside your existing server { } block in /etc/nginx/sites-enabled/default
# (or wherever your port-80 server block lives)
#
# Rate-limit zone — add this to the http { } block (NOT inside server { }):
#   limit_req_zone $binary_remote_addr zone=rsbs_api:1m rate=10r/s;
#
# After adding, test and reload:
#   sudo nginx -t && sudo systemctl reload nginx

location /stats/ {
    proxy_pass         http://127.0.0.1:8080/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_redirect        off;
    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://*.planespotters.net https://*.plnspttrs.net https://airport-data.com https://*.airport-data.com https://hexdb.io https://*.hexdb.io https://*.openstreetmap.org https://*.tile.openstreetmap.org data:; connect-src 'self'" always;

    # Rate-limit API and CSV export (requires limit_req_zone in http block)
    location /stats/api/ {
        limit_req zone=rsbs_api burst=30 nodelay;
        proxy_pass http://127.0.0.1:8080/api/;
    }
}
