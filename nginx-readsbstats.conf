# readsbstats nginx location block
# Add this inside your existing server { } block in /etc/nginx/sites-enabled/default
# (or wherever your port-80 server block lives)
#
# Rate-limit zone — add this to the http { } block (NOT inside server { }):
#   limit_req_zone $binary_remote_addr zone=rsbs_api:1m rate=10r/s;
#
# After adding, test and reload:
#   sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANT — nginx serves SPA static assets DIRECTLY from frontend/dist/
# via `alias` (faster than proxying through FastAPI; one fewer hop per
# JS / CSS / favicon request). This requires nginx's runtime user to
# have read access to /opt/readsbstats/frontend/dist/. The nginx user is
# `www-data` on Debian/Ubuntu packages or `nginx` on upstream / RHEL
# packages — some systems even have both present. `scripts/update.sh`
# loops over both candidates and adds whichever exist to the
# `readsbstats` group, then restarts nginx the first time membership
# changes. Group membership applies at process start, not reload, so a
# RESTART (not `systemctl reload`) is mandatory after the first add.
# FastAPI also mounts the same paths as a fallback for direct :8080
# access, so the alias blocks below are a pure perf optimisation, not
# load-bearing.

location /stats/ {
    proxy_pass         http://127.0.0.1:8080/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_redirect        off;
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;

    # Security headers
    # Audit-13 A13-044: script-src no longer includes 'unsafe-inline'.
    # Vite emits all JS as external modules; no inline <script> tags. If
    # a future build introduces one, add a hash or nonce rather than
    # re-permitting all inline scripts globally.
    # Audit-13 A13-045: HSTS only set when the request was served over
    # HTTPS (avoids breaking pure-LAN HTTP deployments). COOP isolates
    # the browser context from cross-origin window references.
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    # MapLibre needs `worker-src 'self' blob:` (it bootstraps tile-decoder
    # Web Workers from blob: URLs) and CartoDB in `connect-src` (MapLibre
    # fetches raster tiles via fetch() rather than <img>, unlike Leaflet).
    #
    # script-src SHA-256 covers the inline theme bootstrap in
    # frontend/index.html (runs pre-paint to avoid flash-of-wrong-theme).
    # Audit-13 dropped 'unsafe-inline' but missed this one inline script;
    # the hash unblocks it without re-permitting all inline scripts. If
    # the bootstrap script body ever changes, recompute via:
    #   python3 -c "import hashlib,base64,re;h=hashlib.sha256(re.search(r'<script>([\s\S]*?)</script>', open('frontend/dist/index.html').read()).group(1).encode()).digest();print(base64.b64encode(h).decode())"
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-IxNMK6NcDAkb7OPASYxuoi+C2dXXBirV4e51NMtfqxI='; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' https://*.planespotters.net https://*.plnspttrs.net https://airport-data.com https://*.airport-data.com https://hexdb.io https://*.hexdb.io https://*.openstreetmap.org https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://upload.wikimedia.org data:; connect-src 'self' https://*.basemaps.cartocdn.com" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # Add HSTS when this server block is HTTPS — uncomment after wiring TLS:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Rate-limit API and CSV export (requires limit_req_zone in http block)
    location /stats/api/ {
        limit_req zone=rsbs_api burst=30 nodelay;
        proxy_pass http://127.0.0.1:8080/api/;

        # Audit-13 A13-052: nginx `add_header` does NOT inherit from a
        # parent location once *any* `add_header` is set on the child
        # (per nginx docs — module overrides the entire inherited list).
        # Re-state every parent header here so the inheritance trap is
        # closed AND we don't accidentally drop one we forgot. CSP for
        # this block uses the strictest possible policy — API endpoints
        # return JSON, no scripts / images / frames are ever loaded.
        add_header X-Frame-Options             "SAMEORIGIN"                       always;
        add_header X-Content-Type-Options      "nosniff"                          always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin"  always;
        add_header Content-Security-Policy     "default-src 'none'"               always;
        add_header Cross-Origin-Opener-Policy  "same-origin"                      always;
    }

    # Long-cache hashed SPA assets — served DIRECTLY by nginx via `alias`
    # (no FastAPI hop). Filename contains the content hash so cache
    # busting is automatic on every deploy. index.html itself is served
    # by FastAPI (catch-all) with Cache-Control: no-store so the shell
    # always reflects the latest deploy.
    #
    # add_header inside a child location does NOT inherit from the parent —
    # the four headers below MUST be re-applied here or they'd be missing.
    location /stats/assets/ {
        alias /opt/readsbstats/frontend/dist/assets/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options        "SAMEORIGIN"  always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    }

    # Top-level static files Vite emits at the root of dist/ (NOT under
    # dist/assets/). Exact-match locations — one per file. If you add
    # more files to frontend/public/ in the future, add a sibling block.
    location = /stats/favicon.svg {
        alias /opt/readsbstats/frontend/dist/favicon.svg;
        expires 7d;
        add_header Cache-Control          "public"      always;
        add_header X-Content-Type-Options "nosniff"      always;
    }
}
