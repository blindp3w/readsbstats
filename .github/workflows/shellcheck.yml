name: shellcheck

# Audit-13 A13-102: lint the bash scripts that ship to the Pi. Catches
# the kind of shellcheck-flagged patterns the project ignored before:
# parsing `ls` output, missing quotes around variable expansions, etc.
# Bash scripts run as root on the Pi during update.sh — getting one
# wrong is a deploy-time foot-gun.

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**.sh'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**.sh'

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run shellcheck
        run: shellcheck scripts/*.sh
