name: CodeQL

# Audit-13 A13-054: the previous CodeQL run lived in GitHub's default-setup
# UI (not version-controlled), which means a maintainer-flipped switch could
# silently disable security scanning. Committing the workflow makes the
# scanning configuration part of the repo history and PR review surface.
#
# Languages: python + javascript-typescript (covers the FastAPI backend and
# the React SPA). Each runs in its own job so a transient failure in one
# language doesn't mask the other's findings.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan, Sunday 06:00 UTC. The push/PR triggers cover
    # incremental diffs; the schedule catches drift in dependencies and
    # any rule-update changes from upstream CodeQL packs.
    - cron: '0 6 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      # Audit 17: SHA-pinned to match test.yml / shellcheck.yml. This is the
      # workflow with `security-events: write`, so a moved/compromised tag here
      # is the highest-value supply-chain target — never leave it tag-pinned.
      # Dependabot's github-actions group (see .github/dependabot.yml) keeps the
      # SHAs current and refreshes the trailing version comments.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: '/language:${{ matrix.language }}'
