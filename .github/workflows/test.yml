name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest --tb=short -q

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest --cov=readsbstats --cov-report=term-missing --cov-fail-under=90

      - name: Set up Node.js
        if: matrix.python-version == '3.12'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Activate npm 11 via corepack
        # The Node 22.22.2 image's bundled npm 10.9.4 is broken
        # (`Cannot find module promise-retry` on -g installs) AND
        # earlier npm 10.x hits the "Exit handler never called!" race
        # on lockfiles with many optional native binaries. corepack
        # ships with Node and can prepare a clean npm without going
        # through the broken global install path.
        if: matrix.python-version == '3.12'
        run: |
          corepack enable
          corepack prepare npm@11.0.0 --activate
          npm --version

      - name: Install frontend dependencies
        # --maxsockets=1 serialises HTTP fetches. Our lockfile has 70+
        # platform-specific optional packages; parallel resolution
        # trips npm/cli#4828 ("Exit handler never called!") on hosted
        # runners regardless of npm version. Slower (~2 min vs 30 s)
        # but deterministic.
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: npm ci --no-audit --no-fund --maxsockets=1

      - name: Build frontend (tsc + Vite)
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: npm run build

      - name: Run frontend unit tests (Vitest)
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: npm test
