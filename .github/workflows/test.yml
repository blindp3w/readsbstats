name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest --tb=short -q

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest --cov=readsbstats --cov-report=term-missing --cov-fail-under=90

      - name: Set up Node.js
        # Node 20 LTS, not 22: Node 22's hosted-runner image ships a
        # broken npm 10.9.4 (`Cannot find module 'promise-retry'`) and
        # `npm ci` of our optional-deps-heavy lockfile also trips the
        # "Exit handler never called!" race in older npm versions.
        # Node 20 LTS ships npm 10.8.x which has neither problem and
        # tracks the same package-lock format.
        if: matrix.python-version == '3.12'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend (tsc + Vite)
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: npm run build

      - name: Run frontend unit tests (Vitest)
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: npm test
