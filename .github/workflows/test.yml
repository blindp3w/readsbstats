name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # Audit-13 A13-047: first-party actions pinned to full commit SHAs.
      # Tag-pinning means an action's maintainer (or anyone who compromises
      # them) can move the tag to attacker-controlled code; SHAs are
      # immutable. Dependabot tracks these so security bumps still happen.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest --tb=short -q

      # Gate raised 90 → 93 after the 2026-06-11 coverage push (measured 98%
      # statement / 97% with --cov-branch); ≥5% headroom so a legitimately
      # hard-to-test branch never blocks an unrelated PR.
      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest --cov=readsbstats --cov-report=term-missing --cov-fail-under=93

      - name: Set up Node.js
        if: matrix.python-version == '3.12'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Activate npm 11 via corepack
        # The Node 22.22.2 image's bundled npm 10.9.4 is broken
        # (`Cannot find module promise-retry` on -g installs) AND
        # earlier npm 10.x hits the "Exit handler never called!" race
        # on lockfiles with many optional native binaries. corepack
        # ships with Node and can prepare a clean npm without going
        # through the broken global install path.
        if: matrix.python-version == '3.12'
        run: |
          corepack enable
          corepack prepare npm@11.0.0 --activate
          npm --version

      - name: Install frontend dependencies
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend (tsc + Vite)
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: npm run build

      # Audit-15: strict gate. Errors and warnings both block merge. The
      # zero-warnings baseline was reached by:
      # (1) typing all source-file `any` casts in chart formatters;
      # (2) allowlisting test-file `any` via per-file override in
      #     `eslint.config.mjs`;
      # (3) disabling `react-refresh/only-export-components` for the
      #     shadcn-style UI primitives (multi-component Radix wrappers
      #     export several parts from one file by design);
      # (4) extracting non-component exports (chart option builders,
      #     `useRange` hook) to sibling files so page components stay
      #     pure component-export modules;
      # (5) fixing the 8 react-hooks v7 purity / set-state-in-effect
      #     violations (RangePicker, HealthStripe, TimePicker, History,
      #     Metrics).
      - name: Lint frontend (ESLint, strict)
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: npm run lint -- --max-warnings 0

      # Coverage is report-only (no thresholds): the v8 report in the job log
      # tracks which src/ files have no tests at all (coverage.include in
      # vitest.config.ts makes never-imported files count as 0%).
      - name: Run frontend unit tests (Vitest + coverage report)
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: npm run test:coverage

      # Audit-15 regression-lock job. Runs the three Playwright tests that
      # pin today's bug fixes:
      #   - HealthStripe second-square click re-focuses the new row
      #     (was: focus stuck on first row when panel already open)
      #   - History `+ filter…` resets on reopen after submit
      #     (was: previously-submitted field/value persisted)
      #   - Custom range form re-initialises with the new preset's window
      #     after the popover closes via preset-click outside-click.
      # The wider device-matrix UI suite (tests/ui/*) stays local-only —
      # the goal here is to gate the specific regressions, not to mirror
      # the manual pre-release smoke pass.
      - name: Install Playwright extras + browsers
        if: matrix.python-version == '3.12'
        run: |
          pip install -e ".[ui-tests]"
          playwright install --with-deps webkit chromium

      - name: Run Playwright regression locks
        if: matrix.python-version == '3.12'
        run: |
          pytest -q \
            tests/ui/test_mobile_smoke.py::test_v2_health_stripe_second_square_click_re_focuses \
            tests/ui/test_mobile_smoke.py::test_v2_history_add_filter_resets_after_submit \
            tests/ui/test_mobile_smoke.py::test_v2_range_picker_reopen_after_preset_reflects_new_window
